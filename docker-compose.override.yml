# Local development overrides — host port mappings for the databases.
# Applied automatically by `docker compose` on top of docker-compose.yml.

services:
  source-db:
    ports:
      - "5433:5432"

  analytics-db:
    ports:
      - "5434:5432"

  ai-engine:
    ports:
      - "8000:8000"

  api:
    ports:
      - "8001:8000"

  grafana:
    ports:
      - "3000:3000"
