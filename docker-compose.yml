name: personal-finance-analytics

# Foundation services. App services (api, ai-engine, dbt, superset, observability)
# are added in their respective steps.

services:
  source-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${SOURCE_DB_USER}
      POSTGRES_PASSWORD: ${SOURCE_DB_PASSWORD}
      POSTGRES_DB: ${SOURCE_DB_NAME}
    volumes:
      - source-db-data:/var/lib/postgresql/data
      - ./source-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_DB_USER} -d ${SOURCE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [finance]

  analytics-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
      # Consumed by 02-setup-fdw.sql (step 3) to wire the foreign server.
      SOURCE_DB_HOST: source-db
      SOURCE_DB_NAME: ${SOURCE_DB_NAME}
      SOURCE_DB_USER: ${SOURCE_DB_USER}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
    volumes:
      - analytics-db-data:/var/lib/postgresql/data
      - ./analytics-db/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      source-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [finance]

  mock-data:
    build: ./mock-data
    profiles: ["tools"]          # run on demand: `make generate`
    environment:
      SOURCE_DB_HOST: source-db
      SOURCE_DB_PORT: "5432"
      SOURCE_DB_NAME: ${SOURCE_DB_NAME}
      SOURCE_DB_USER: ${SOURCE_DB_USER}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
    depends_on:
      source-db:
        condition: service_healthy
    networks: [finance]

  dbt:
    build: ./dbt
    profiles: ["tools"]          # run on demand: `make dbt-build`
    environment:
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: "5432"
      ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
    volumes:
      - ./dbt:/app          # live models without rebuilding the image
    depends_on:
      analytics-db:
        condition: service_healthy
    networks: [finance]

  ai-engine:
    build: ./ai-engine
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_MODEL_ID: ${AI_MODEL_ID:-claude-sonnet-4-6}
      AI_EFFORT: ${AI_EFFORT:-medium}
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: "5432"
      ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      analytics-db:
        condition: service_healthy
    networks: [finance]

  api:
    build: ./api
    environment:
      AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:8000}
      SUPERSET_URL: ${SUPERSET_URL:-http://superset:8088}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: "5432"
      ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    depends_on:
      analytics-db:
        condition: service_healthy
    networks: [finance]

  # --- observability stack: api/ai-engine -> collector -> Tempo (traces) + Prometheus (metrics) -> Grafana ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel/config.yaml:ro
    depends_on: [tempo]
    networks: [finance]

  tempo:
    image: grafana/tempo:2.7.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks: [finance]

  prometheus:
    image: prom/prometheus:v3.2.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on: [otel-collector]
    networks: [finance]

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [tempo, prometheus]
    networks: [finance]

volumes:
  source-db-data:
  analytics-db-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  finance:
    driver: bridge
