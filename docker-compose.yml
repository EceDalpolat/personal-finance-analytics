name: personal-finance-analytics

# Foundation services. App services (api, ai-engine, dbt, superset, observability)
# are added in their respective steps.

services:
  source-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${SOURCE_DB_USER}
      POSTGRES_PASSWORD: ${SOURCE_DB_PASSWORD}
      POSTGRES_DB: ${SOURCE_DB_NAME}
    volumes:
      - source-db-data:/var/lib/postgresql/data
      - ./source-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOURCE_DB_USER} -d ${SOURCE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [finance]

  analytics-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
      # Consumed by 02-setup-fdw.sql (step 3) to wire the foreign server.
      SOURCE_DB_HOST: source-db
      SOURCE_DB_NAME: ${SOURCE_DB_NAME}
      SOURCE_DB_USER: ${SOURCE_DB_USER}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
    volumes:
      - analytics-db-data:/var/lib/postgresql/data
      - ./analytics-db/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      source-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ANALYTICS_DB_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [finance]

  mock-data:
    build: ./mock-data
    profiles: ["tools"]          # run on demand: `make generate`
    environment:
      SOURCE_DB_HOST: source-db
      SOURCE_DB_PORT: "5432"
      SOURCE_DB_NAME: ${SOURCE_DB_NAME}
      SOURCE_DB_USER: ${SOURCE_DB_USER}
      SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
    depends_on:
      source-db:
        condition: service_healthy
    networks: [finance]

volumes:
  source-db-data:
  analytics-db-data:

networks:
  finance:
    driver: bridge
