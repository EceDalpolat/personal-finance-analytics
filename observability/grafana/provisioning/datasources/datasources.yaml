# Grafana datasources, auto-provisioned at startup. Traces are explored via
# Explore -> Tempo; span-derived metrics via Prometheus.

apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    isDefault: true

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
