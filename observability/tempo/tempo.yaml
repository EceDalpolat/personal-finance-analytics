# Grafana Tempo — single-binary trace store. Receives OTLP traces (gRPC) from
# the collector and serves them to Grafana over its HTTP API (:3200).

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
